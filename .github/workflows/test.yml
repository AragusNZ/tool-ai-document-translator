name: Test

on:
  push:
    tags-ignore: ["v*"]
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev,monitoring,openai,anthropic,google]"

      - name: pip-audit
        run: pip-audit

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            tesseract-ocr \
            tesseract-ocr-eng \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            libreoffice-writer

      - name: Install Python package
        run: pip install -e ".[dev,monitoring]"

      - name: Run tests with coverage
        if: matrix.python-version == '3.12'
        run: pytest --cov=document_translator --cov-report=xml --cov-report=term-missing --cov-fail-under=85

      - name: Run tests
        if: matrix.python-version != '3.12'
        run: pytest

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
